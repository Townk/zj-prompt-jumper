name: Release

on:
  push:
    branches: [master]
    tags: ["v*"]

# Publishing mutates releases/tags, so don't let two runs race.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ASSET: target/wasm32-wasip1/release/zj-prompt-jumper.wasm

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      # Quality gate: never publish an asset that doesn't lint, test, or build.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build (wasm release)
        run: cargo build --release --target wasm32-wasip1

      # Rolling prerelease: every push to master refreshes the `latest` tag so
      # configs can pin to a single always-current asset URL.
      - name: Publish rolling "latest" release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Rolling build (latest)" \
            --notes "Automatically built from the latest commit on \`master\` (${GITHUB_SHA:0:7}). For a pinned, stable build use a versioned release instead." \
            "$ASSET"

      # Versioned release: pushing a `vX.Y.Z` tag cuts an immutable release.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "$ASSET"
